<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>編輯個案</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang TC', 'Noto Sans TC', sans-serif;
      background: #EBF4FC;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container {
      width: 100%;
      max-width: 820px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── 頁首 ── */
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .btn-back {
      font-size: 12px;
      color: #378ADD;
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
      transition: color 0.2s;
    }
    .btn-back:hover { color: #185FA5; }

    .page-title {
      font-size: 20px;
      font-weight: 500;
      color: #0C447C;
    }

    .header-spacer { width: 60px; }

    /* ── 兩欄主體 ── */
    .form-body {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      align-items: start;
    }

    /* ── 欄位卡片 ── */
    .form-col {
      background: white;
      border-radius: 12px;
      border: 0.5px solid #B5D4F4;
      padding: 20px 22px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .col-title {
      font-size: 10px;
      color: #185FA5;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding-bottom: 8px;
      border-bottom: 0.5px solid #E6F1FB;
    }

    /* ── 欄位 ── */
    .field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .field-label {
      font-size: 11px;
      color: #185FA5;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .required { color: #E24B4A; font-size: 10px; }
    .optional { color: #B4B2A9; font-size: 10px; font-weight: 400; }

    .field-input {
      width: 100%;
      background: #EBF4FC;
      border: 1px solid #B5D4F4;
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 13px;
      color: #0C447C;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      font-family: inherit;
    }
    .field-input:focus {
      border-color: #185FA5;
      background: #daeaf8;
    }

    .field-textarea {
      width: 100%;
      background: #EBF4FC;
      border: 1px solid #B5D4F4;
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 13px;
      color: #0C447C;
      outline: none;
      resize: vertical;
      min-height: 72px;
      line-height: 1.6;
      transition: border-color 0.2s, background 0.2s;
      font-family: inherit;
    }
    .field-textarea:focus {
      border-color: #185FA5;
      background: #daeaf8;
    }

    /* 性別單選 */
    .gender-row {
      display: flex;
      gap: 10px;
    }

    .gender-opt {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }

    .gender-opt input[type="radio"] {
      accent-color: #185FA5;
      width: 14px;
      height: 14px;
      cursor: pointer;
    }

    .gender-opt span {
      font-size: 13px;
      color: #0C447C;
    }

    /* ── 底部按鈕列 ── */
    .btn-row {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    .btn-cancel {
      font-size: 13px;
      background: white;
      color: #185FA5;
      border: 1px solid #B5D4F4;
      border-radius: 6px;
      padding: 10px 22px;
      cursor: pointer;
      transition: background 0.2s;
      font-family: inherit;
    }
    .btn-cancel:hover { background: #E6F1FB; }

    .btn-submit {
      font-size: 13px;
      background: #185FA5;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 10px 28px;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.2s;
      font-family: inherit;
    }
    .btn-submit:hover { background: #0C447C; }
    .btn-submit:active { background: #042C53; }

    /* ── 必填提示 ── */
    .required-note {
      font-size: 10px;
      color: #378ADD;
      text-align: right;
    }
    .required-note span { color: #E24B4A; }

    /* RWD */
    @media (max-width: 600px) {
      .form-body { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- 頁首 -->
    <div class="page-header">
      <button class="btn-back" onclick="location.href='patient_detail.html?id=' + patientId">← 返回個案詳細</button>
      <div class="page-title">編輯個案</div>
      <div class="header-spacer"></div>
    </div>

    <!-- 兩欄表單 -->
    <div class="form-body">

      <!-- 左欄：基本資料 -->
      <div class="form-col">
        <div class="col-title">基本資料</div>

        <div class="field">
          <label class="field-label">姓名 <span class="required">✱</span></label>
          <input class="field-input" type="text" name="name">
        </div>

        <div class="field">
          <label class="field-label">Email <span class="required">✱</span></label>
          <input class="field-input" type="email" name="email">
        </div>

        <div class="field">
          <label class="field-label">身高（公分）<span class="required">✱</span></label>
          <input class="field-input" type="number" name="height" min="0" step="0.1">
        </div>

        <div class="field">
          <label class="field-label">體重（公斤）<span class="required">✱</span></label>
          <input class="field-input" type="number" name="weight" min="0" step="0.1">
        </div>

        <div class="field">
          <label class="field-label">電話 <span class="required">✱</span></label>
          <input class="field-input" type="tel" name="phone">
        </div>

        <div class="field">
          <label class="field-label">出生日期</label>
          <input class="field-input" type="date" name="date_of_birth" disabled style="opacity:0.6;cursor:not-allowed;">
        </div>

        <div class="field">
          <label class="field-label">性別</label>
          <div class="gender-row">
            <label class="gender-opt">
              <input type="radio" name="gender" value="0" disabled>
              <span>女（Female）</span>
            </label>
            <label class="gender-opt">
              <input type="radio" name="gender" value="1" disabled>
              <span>男（Male）</span>
            </label>
          </div>
        </div>

        <div class="field">
          <label class="field-label">職業 <span class="optional">選填</span></label>
          <input class="field-input" type="text" name="profession">
        </div>
      </div>

      <!-- 右欄：臨床資訊 -->
      <div class="form-col">
        <div class="col-title">臨床資訊</div>

        <div class="field">
          <label class="field-label">診斷 <span class="required">✱</span></label>
          <input class="field-input" type="text" name="diagnosis">
        </div>

        <div class="field">
          <label class="field-label">KL Grade（X 光分級）<span class="optional">選填</span></label>
          <input class="field-input" type="number" name="kl_grade" min="0" max="4">
        </div>

        <div class="field">
          <label class="field-label">主訴 <span class="optional">選填</span></label>
          <textarea class="field-textarea" name="chief_complaint"></textarea>
        </div>

        <div class="field">
          <label class="field-label">加重因素 <span class="optional">選填</span></label>
          <textarea class="field-textarea" name="aggravating_factors"></textarea>
        </div>

        <div class="field">
          <label class="field-label">病程（月）<span class="optional">選填</span></label>
          <input class="field-input" type="number" name="symptom_duration_months" min="0">
        </div>

        <div class="field">
          <label class="field-label">相關病史 <span class="optional">選填</span></label>
          <textarea class="field-textarea" name="medical_history"></textarea>
        </div>

        <div class="field">
          <label class="field-label">影像學結果 <span class="optional">選填</span></label>
          <textarea class="field-textarea" name="imaging_findings"></textarea>
        </div>

        <div class="field">
          <label class="field-label">就診流程紀錄 <span class="optional">選填</span></label>
          <textarea class="field-textarea" name="visit_flow"></textarea>
        </div>

        <div class="field">
          <label class="field-label">是否有接受其他膝蓋治療 <span class="optional">選填</span></label>
          <div class="gender-row">
            <label class="gender-opt">
              <input type="radio" name="otherTx" value="yes" id="otherTx-yes">
              <span>是</span>
            </label>
            <label class="gender-opt">
              <input type="radio" name="otherTx" value="no" id="otherTx-no" checked>
              <span>否</span>
            </label>
          </div>
          <textarea class="field-textarea" name="other_knee_treatment_comment"
                    id="otherTx-textarea" placeholder="請簡要描述治療內容…"
                    style="display: none; margin-top: 4px;"></textarea>
        </div>
      </div>

    </div>

    <!-- 按鈕列 -->
    <div class="required-note"><span>✱</span> 為必填欄位</div>
    <div class="btn-row">
      <button class="btn-cancel" onclick="location.href='patient_detail.html?id=' + patientId">取消</button>
      <button class="btn-submit" onclick="submitEdit()">儲存變更</button>
    </div>

  </div>

  <script>
    const API_URL = 'https://therapistclinical-production.up.railway.app';

    function field(name) {
      return document.querySelector(`[name="${name}"]`);
    }

    function tsToDateStr(ts) {
      const d = new Date(ts * 1000);
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }

    const patientId = new URLSearchParams(location.search).get('id');

    async function loadPatient() {

      try {
        const res = await fetch(`${API_URL}/patients/${patientId}`, {
          headers: {},
        });
        const data = await res.json();
        if (!data.result) {
          alert(data.message);
          return;
        }

        const p = data.data;
        field('name').value                    = p.name || '';
        field('email').value                   = p.email || '';
        field('height').value                  = p.height ?? '';
        field('weight').value                  = p.weight ?? '';
        field('phone').value                   = p.phone || '';
        field('date_of_birth').value           = p.date_of_birth ? tsToDateStr(p.date_of_birth) : '';
        field('profession').value              = p.profession || '';
        field('diagnosis').value               = p.diagnosis || '';
        field('kl_grade').value                = p.kl_grade ?? '';
        field('chief_complaint').value         = p.chief_complaint || '';
        field('aggravating_factors').value     = p.aggravating_factors || '';
        field('symptom_duration_months').value = p.symptom_duration_months ?? '';
        field('medical_history').value         = p.medical_history || '';
        field('imaging_findings').value        = p.imaging_findings || '';
        field('visit_flow').value              = p.visit_flow || '';

        const hasTx = p.other_knee_treatment_comment != null;
        document.getElementById('otherTx-yes').checked = hasTx;
        document.getElementById('otherTx-no').checked  = !hasTx;
        const txArea = document.getElementById('otherTx-textarea');
        txArea.value         = p.other_knee_treatment_comment || '';
        txArea.style.display = hasTx ? 'block' : 'none';

        const genderRadio = document.querySelector(`[name="gender"][value="${p.gender}"]`);
        if (genderRadio) genderRadio.checked = true;
      } catch (e) {
        alert(e.message);
      }
    }

    async function submitEdit() {

      const body = {
        id: parseInt(patientId),
        name: field('name').value.trim() || null,
        email: field('email').value.trim() || null,
        height: field('height').value !== '' ? parseFloat(field('height').value) : null,
        weight: field('weight').value !== '' ? parseFloat(field('weight').value) : null,
        phone: field('phone').value.trim() || null,
        diagnosis: field('diagnosis').value.trim() || null,
        profession: field('profession').value.trim() || null,
        kl_grade: field('kl_grade').value !== '' ? parseInt(field('kl_grade').value) : null,
        chief_complaint: field('chief_complaint').value.trim() || null,
        aggravating_factors: field('aggravating_factors').value.trim() || null,
        symptom_duration_months: field('symptom_duration_months').value !== '' ? parseInt(field('symptom_duration_months').value) : null,
        medical_history: field('medical_history').value.trim() || null,
        imaging_findings: field('imaging_findings').value.trim() || null,
        visit_flow: field('visit_flow').value.trim() || null,
        other_knee_treatment_comment: document.getElementById('otherTx-yes').checked
          ? (document.getElementById('otherTx-textarea').value.trim() || null)
          : null,
      };

      try {
        const res = await fetch(`${API_URL}/patients`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        if (data.result) {
          location.href = `patient_detail.html?id=${patientId}`;
        } else {
          alert(data.message);
        }
      } catch (e) {
        alert(e.message);
      }
    }

    loadPatient();

    document.getElementById('otherTx-yes').addEventListener('change', function () {
      document.getElementById('otherTx-textarea').style.display = 'block';
    });
    document.getElementById('otherTx-no').addEventListener('change', function () {
      document.getElementById('otherTx-textarea').style.display = 'none';
    });

    // keep-alive: ping /health every 10s to prevent Railway sleeping
        // keep-alive: ping /health every 10s to prevent Railway sleeping
    setInterval(async () => {
      try {
        const res = await fetch('${API_URL}/health');
        if (res.ok) {
          document.getElementById('connectionOverlay').style.display = 'none';
        } else {
          document.getElementById('connectionOverlay').style.display = 'flex';
        }
      } catch (e) {
        document.getElementById('connectionOverlay').style.display = 'flex';
      }
    }, 10000);
  </script>

  <!-- 連線失敗提示 -->
  <div id="connectionOverlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:9999; align-items:center; justify-content:center;">
    <div style="background:white; border-radius:12px; padding:32px 28px; text-align:center; display:flex; flex-direction:column; gap:14px; max-width:300px; box-shadow:0 8px 32px rgba(0,0,0,0.2);">
      <div style="font-size:16px; font-weight:600; color:#0C447C;">嘗試連線中</div>
      <div style="font-size:13px; color:#378ADD; line-height:1.6;">請稍後...</div>
      <button onclick="document.getElementById('connectionOverlay').style.display='none'" style="background:#185FA5; color:white; border:none; border-radius:6px; padding:10px 24px; font-size:14px; cursor:pointer; font-family:inherit; font-weight:500; margin-top:4px;">確定</button>
    </div>
  </div>
</body>
</html>
