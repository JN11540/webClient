<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>個案詳細資料</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Microsoft JhengHei', '微軟正黑體', sans-serif;
      background: #deeaf5;
      min-height: 100vh;
      padding: 16px;
    }

    .container {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ── 頁首 ── */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .btn-back {
      font-size: 20px;
      color: #2a6db5;
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
      transition: color 0.2s;
    }
    .btn-back:hover { color: #185FA5; }

    .case-name {
      font-size: 32px;
      font-weight: bold;
      color: #1a1a1a;
    }

    .topbar-actions { display: flex; gap: 8px; }

    .btn-edit-patient {
      font-size: 20px;
      background: #E6F1FB;
      color: #185FA5;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      cursor: pointer;
      font-family: inherit;
      font-weight: 500;
      transition: background 0.2s;
    }
    .btn-edit-patient:hover { background: #B5D4F4; }

    /* ── 卡片 ── */
    .card {
      background: white;
      border-radius: 12px;
      border: 0.5px solid #c5d8ee;
      padding: 20px 24px;
    }

    .sec-hd {
      font-size: 20px;
      font-weight: 700;
      color: #2a6db5;
      padding-bottom: 10px;
      border-bottom: 0.5px solid #c5d8ee;
      margin-bottom: 16px;
    }

    /* ── 個案基本資料 ── */
    .info-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px 20px;
      margin-bottom: 16px;
    }

    .info-field { display: flex; flex-direction: column; gap: 4px; }

    .info-lbl { font-size: 20px; color: #378ADD; }

    .info-val {
      font-size: 20px;
      font-weight: 500;
      color: #0C447C;
    }

    .info-val.empty { color: #B4B2A9; font-weight: 400; }

    .divider {
      border: none;
      border-top: 0.5px solid #c5d8ee;
      margin: 14px 0;
    }

    .info-block { display: flex; flex-direction: column; gap: 12px; }
    .info-row { display: flex; flex-direction: column; gap: 4px; }
    .info-lbl-sm { font-size: 20px; color: #378ADD; }
    .info-txt { font-size: 20px; color: #0C447C; line-height: 1.6; }
    .info-txt.empty { color: #B4B2A9; }

    /* ── 空白預留 ── */
    .placeholder {
      font-size: 16px;
      color: #B5D4F4;
      text-align: center;
      padding: 24px;
      border: 0.5px dashed #B5D4F4;
      border-radius: 8px;
    }

    /* ── 治療前後比較 ── */
    .compare-hd {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .btn-group { display: flex; gap: 8px; }

    .btn-add {
      font-size: 20px;
      padding: 8px 18px;
      border-radius: 6px;
      border: none;
      background: #185FA5;
      color: white;
      cursor: pointer;
      font-family: inherit;
      font-weight: 500;
      transition: background 0.2s;
    }
    .btn-add:hover { background: #0C447C; }

    .assessment-cards { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }

    .assessment-card {
      background: #EBF4FC;
      border: 0.5px solid #B5D4F4;
      border-radius: 8px;
      padding: 12px 18px;
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 16px;
      width: 100%;
    }

    .assessment-card-num {
      font-size: 20px;
      font-weight: 500;
      color: #378ADD;
      white-space: nowrap;
      min-width: 90px;
    }

    .assessment-card-name { font-size: 20px; font-weight: 500; color: #0C447C; flex: 1; }
    .assessment-card-date { font-size: 20px; color: #378ADD; white-space: nowrap; }
    .assessment-card-btns { display: flex; gap: 8px; margin-left: auto; }

    .assessment-card-btn-edit {
      font-size: 20px;
      padding: 6px 16px;
      border-radius: 6px;
      cursor: pointer;
      border: 0.5px solid #B5D4F4;
      background: white;
      color: #185FA5;
      font-family: inherit;
      transition: background 0.2s;
    }
    .assessment-card-btn-edit:hover { background: #E6F1FB; }

    .assessment-card-btn-del {
      font-size: 20px;
      padding: 6px 16px;
      border-radius: 6px;
      cursor: pointer;
      border: 0.5px solid #F7C1C1;
      background: #FCEBEB;
      color: #A32D2D;
      font-family: inherit;
      transition: background 0.2s;
    }
    .assessment-card-btn-del:hover { background: #F7C1C1; }

    /* ── 空狀態 ── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 48px 20px;
    }

    .empty-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: #E6F1FB;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .empty-icon svg {
      width: 32px;
      height: 32px;
      fill: #378ADD;
    }

    .empty-title {
      font-size: 20px;
      font-weight: 500;
      color: #0C447C;
    }

    .empty-sub {
      font-size: 20px;
      color: #378ADD;
      text-align: center;
      line-height: 1.8;
    }

    /* ── 治療前後比較：子標題 ── */
    .sub-lbl {
      font-size: 20px;
      font-weight: 600;
      color: #185FA5;
      margin: 16px 0 10px;
      padding-left: 10px;
      border-left: 3px solid #B5D4F4;
    }

    /* ── 表格 ── */
    table { width: 100%; border-collapse: collapse; font-size: 20px; }
    table th { background: #E6F1FB; color: #185FA5; padding: 10px 14px; text-align: left; font-weight: 600; border-bottom: 0.5px solid #B5D4F4; font-size: 20px; }
    table td { padding: 10px 14px; color: #0C447C; border-bottom: 0.5px solid #EBF4FC; font-size: 20px; }
    table tr:last-child td { border-bottom: none; }
    table tr:hover td { background: #F5FAFF; }

    /* ════ 治療計畫 ════ */
    .plan-section-hd { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
    .plan-list { display:flex; flex-direction:column; gap:12px; }
    .plan-card { border:0.5px solid #B5D4F4; border-radius:10px; overflow:hidden; background:#F5FAFF; }
    .plan-card-header { display:flex; align-items:center; gap:12px; padding:12px 16px; background:#EBF4FC; border-bottom:0.5px solid #D4E9F8; }
    .plan-card-header-title { display:flex; align-items:center; gap:10px; flex:1; min-width:0; }
    .plan-card-name { font-size:20px; font-weight:600; color:#0C447C; flex:1; min-width:0; }
    .plan-card-actions { display:flex; gap:6px; flex-shrink:0; }
    .plan-card-btn { font-size:20px; padding:6px 16px; border-radius:6px; cursor:pointer; font-family:inherit; transition:background .15s; }
    .plan-card-btn-edit { border:0.5px solid #B5D4F4; background:#E6F1FB; color:#185FA5; }
    .plan-card-btn-edit:hover { background:#B5D4F4; }
    .plan-card-btn-del { border:0.5px solid #F7C1C1; background:#FCEBEB; color:#A32D2D; }
    .plan-card-btn-del:hover { background:#F7C1C1; }
    .export-countdown { font-size:52px; font-weight:700; color:#185FA5; line-height:1; }
    .export-status { font-size:20px; color:#378ADD; min-height:20px; }
    .export-result { font-size:20px; font-weight:500; color:#0C447C; line-height:1.6; }
    .export-confirm-btn { padding:10px 32px; background:#185FA5; color:#fff; border:none; border-radius:6px; font-family:inherit; font-size:20px; font-weight:600; cursor:pointer; margin-top:4px; transition:background .15s; }
    .export-confirm-btn:hover { background:#0C447C; }
    .export-confirm-btn.err { background:#A32D2D; }
    .export-confirm-btn.err:hover { background:#7a1f1f; }
    .plan-card-body { display:block; padding:0; }
    .plan-qr-row { padding:10px 16px; background:#EBF4FC; border-bottom:0.5px solid #D4E9F8; display:flex; align-items:center; gap:10px; }
    .plan-qr-row .qrcode-area { margin-top:8px; width:100%; }
    .plan-meta-bar { display:flex; align-items:stretch; border-bottom:0.5px solid #E6F1FB; background:white; }
    .plan-meta-item { flex:1; padding:12px 16px; display:flex; flex-direction:column; gap:4px; }
    .plan-meta-label { font-size:20px; font-weight:600; color:#9BBCDC; }
    .plan-meta-value { font-size:20px; font-weight:600; color:#0C447C; }
    .plan-meta-divider { width:0.5px; background:#E6F1FB; flex-shrink:0; }
    .plan-schedule-wrap { padding:16px 16px 20px; }
    .plan-schedule-label { font-size:20px; font-weight:600; color:#185FA5; margin-bottom:12px; }
    .plan-table-wrap { border:0.5px solid #B5D4F4; border-radius:8px; overflow:hidden; }
    .plan-table { width:100%; border-collapse:collapse; font-size:20px; }
    .plan-table thead tr { background:#185FA5; }
    .plan-table th { padding:10px 14px; font-size:20px; font-weight:600; color:#fff; text-align:left; border:none; background:transparent; }
    .plan-table th.col-week { width:200px; text-align:center; }
    .plan-table tbody tr { border-bottom:0.5px solid #E6F1FB; }
    .plan-table tbody tr:last-child { border-bottom:none; }
    .plan-table tbody tr:nth-child(even) td { background:#F5FAFF; }
    .plan-table tbody tr:hover td { background:#EBF4FC; }
    .plan-table td { padding:14px; vertical-align:top; color:#0C447C; border:none; font-size:20px; }
    .plan-table td.td-week { text-align:center; background:#F0F7FF; border-right:0.5px solid #E6F1FB; }
    .plan-week-badge { display:inline-block; font-size:20px; font-weight:700; background:#185FA5; color:#fff; padding:4px 14px; border-radius:20px; margin-bottom:6px; }
    .plan-week-range { font-size:20px; font-weight:600; color:#378ADD; line-height:1.6; }
    .ex-list { list-style:none; padding:0; margin:0; display:flex; flex-direction:column; gap:8px; }
    .ex-item { display:flex; align-items:flex-start; gap:8px; line-height:1.5; }
    .ex-bullet { width:8px; height:8px; border-radius:50%; background:#185FA5; flex-shrink:0; margin-top:8px; }
    .ex-name { font-weight:600; color:#0C447C; font-size:20px; }
    .ex-params { color:#378ADD; font-size:20px; }
    .ex-day-tags { display:flex; flex-wrap:wrap; gap:4px; margin-top:5px; }
    .ex-day-tag { font-size:20px; background:#E6F1FB; color:#185FA5; border-radius:4px; padding:3px 10px; font-weight:500; }
    .no-ex { color:#B5D4F4; font-style:italic; font-size:20px; }
    .es-badge { font-size:20px; font-weight:600; color:#A32D2D; background:#FCEBEB; border:0.5px solid #F7C1C1; border-radius:6px; padding:6px 16px; flex-shrink:0; }
    .ex-es-params { color:#c0392b; font-size:20px; display:block; margin-top:2px; }

    @media (max-width: 600px) {
      .info-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- 頁首 -->
    <div class="topbar">
      <button class="btn-back" onclick="location.href='home.html'">← 返回首頁</button>
      <div class="case-name" id="case-name">—</div>
      <div style="width:80px;"></div>
    </div>

    <!-- 個案基本資料 -->
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; padding-bottom:10px; border-bottom:0.5px solid #c5d8ee; margin-bottom:16px;">
        <div class="sec-hd" style="border:none; padding:0; margin:0;">個案基本資料</div>
        <button class="btn-edit-patient" id="btn-edit">✎ 編輯個案</button>
      </div>
      <div class="info-grid">
        <div class="info-field">
          <div class="info-lbl">姓名</div>
          <div class="info-val" id="f-name">—</div>
        </div>
        <div class="info-field">
          <div class="info-lbl">Email</div>
          <div class="info-val" id="f-email">—</div>
        </div>
        <div class="info-field">
          <div class="info-lbl">電話</div>
          <div class="info-val" id="f-phone">—</div>
        </div>
        <div class="info-field">
          <div class="info-lbl">性別</div>
          <div class="info-val" id="f-gender">—</div>
        </div>
        <div class="info-field">
          <div class="info-lbl">出生日期</div>
          <div class="info-val" id="f-dob">—</div>
        </div>
        <div class="info-field">
          <div class="info-lbl">職業</div>
          <div class="info-val" id="f-profession">—</div>
        </div>
        <div class="info-field">
          <div class="info-lbl">身高</div>
          <div class="info-val" id="f-height">—</div>
        </div>
        <div class="info-field">
          <div class="info-lbl">體重</div>
          <div class="info-val" id="f-weight">—</div>
        </div>
        <div class="info-field">
          <div class="info-lbl">KL Grade</div>
          <div class="info-val" id="f-kl-grade">—</div>
        </div>
        <div class="info-field">
          <div class="info-lbl">病程</div>
          <div class="info-val" id="f-symptom-duration">—</div>
        </div>
      </div>
      <hr class="divider">
      <div class="info-block">
        <div class="info-row">
          <div class="info-lbl-sm">診斷</div>
          <div class="info-txt" id="f-diagnosis">—</div>
        </div>
        <div class="info-row">
          <div class="info-lbl-sm">主訴</div>
          <div class="info-txt" id="f-chief-complaint">—</div>
        </div>
        <div class="info-row">
          <div class="info-lbl-sm">加重因素</div>
          <div class="info-txt" id="f-aggravating-factors">—</div>
        </div>
        <div class="info-row">
          <div class="info-lbl-sm">相關病史</div>
          <div class="info-txt" id="f-medical-history">—</div>
        </div>
        <div class="info-row">
          <div class="info-lbl-sm">影像學結果</div>
          <div class="info-txt" id="f-imaging-findings">—</div>
        </div>
        <div class="info-row">
          <div class="info-lbl-sm">就診流程</div>
          <div class="info-txt" id="f-visit-flow">—</div>
        </div>
        <div class="info-row" style="margin-top: 4px;">
          <div class="info-lbl-sm">是否有接受其他膝蓋治療</div>
          <div style="display: flex; gap: 24px; align-items: center; margin-top: 4px;">
            <label style="display: flex; align-items: center; gap: 8px; font-size: 20px; color: #0C447C;">
              <input type="radio" name="otherTx" value="yes" id="otherTx-yes"
                     style="accent-color: #185FA5; width: 20px; height: 20px;" disabled> 是
            </label>
            <label style="display: flex; align-items: center; gap: 8px; font-size: 20px; color: #0C447C;">
              <input type="radio" name="otherTx" value="no" id="otherTx-no" checked
                     style="accent-color: #185FA5; width: 20px; height: 20px;" disabled> 否
            </label>
          </div>
          <div id="otherTx-txt" class="info-txt"
               style="display: none; margin-top: 6px; padding: 8px 10px;
                      border: 0.5px solid #B5D4F4; border-radius: 6px; background: white;
                      line-height: 1.6;"></div>
        </div>
        <div class="info-row">
          <div class="info-lbl-sm">禁忌症</div>
          <div class="info-txt" id="f-contraindications">—</div>
        </div>
      </div>
    </div>

    <!-- 治療計畫 -->
    <div class="card" id="planCard">
      <div class="plan-section-hd">
        <div class="sec-hd" style="border:none;padding:0;margin:0;">治療計畫</div>
      </div>
      <div class="plan-list" id="planList"></div>
      <div class="placeholder" id="planEmpty" style="display:none;">尚未新增治療計畫</div>
    </div>

    <!-- 治療前後比較 -->
    <div class="card">
      <div class="compare-hd">
        <div class="sec-hd" style="border:none;padding:0;margin:0;">治療前後比較</div>
        <button class="btn-add" onclick="location.href='add_assessment.html?id=' + patientId">＋ 新增評量</button>
      </div>
      <div id="compare-content">
        <div class="empty-state">
          <div class="empty-icon">
            <svg viewBox="0 0 24 24"><path d="M19 3H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V5a2 2 0 00-2-2zm-7 3a1 1 0 110 2 1 1 0 010-2zm4 10H8v-2h8v2zm0-4H8V10h8v2z"/></svg>
          </div>
          <div class="empty-title">尚無評量資料</div>
          <div class="empty-sub">目前還沒有任何評量紀錄<br>點擊右上方按鈕新增第一筆評量</div>
        </div>
      </div>
    </div>

  </div>

  <script>
    const API_URL = 'https://therapistclinical-production.up.railway.app';
    const MAX_RETRIES = 3;
    const _retry = {};

    function tsToDateStr(ts) {
      const d = new Date(ts * 1000);
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }

    function set(id, value, fallback = '—') {
      const el = document.getElementById(id);
      if (value != null && value !== '') {
        el.textContent = value;
        el.classList.remove('empty');
      } else {
        el.textContent = fallback;
        el.classList.add('empty');
      }
    }

    const patientId = new URLSearchParams(location.search).get('id');

    async function loadPatient() {

      try {
        const res = await fetch(`${API_URL}/patients/${patientId}`, {
          headers: {},
        });
        const data = await res.json();
        if (!res.ok) {
          if (res.status === 500 && (_retry.loadPatient || 0) < MAX_RETRIES) {
            _retry.loadPatient = (_retry.loadPatient || 0) + 1;
            alert(`伺服器資料庫啟動中，請稍後再試 (${_retry.loadPatient}/${MAX_RETRIES})`);
            setTimeout(loadPatient, 3000);
          } else { _retry.loadPatient = 0; alert(data.message || '操作失敗'); }
          return;
        }
        _retry.loadPatient = 0;
        if (!data.result) {
          alert(data.message);
          return;
        }

        const p = data.data;

        document.getElementById('case-name').textContent = p.name || '—';
        document.getElementById('btn-edit').onclick = () => {
          location.href = `edit_patient.html?id=${patientId}`;
        };

        set('f-name', p.name);
        set('f-email', p.email);
        set('f-phone', p.phone);
        set('f-gender', p.gender === 1 ? '男（Male）' : '女（Female）');
        set('f-dob', p.date_of_birth ? tsToDateStr(p.date_of_birth) : null);
        set('f-profession', p.profession);
        set('f-height', p.height != null ? `${p.height} cm` : null);
        set('f-weight', p.weight != null ? `${p.weight} kg` : null);
        set('f-kl-grade', p.kl_grade != null ? `KL ${p.kl_grade}` : null);
        set('f-symptom-duration', p.symptom_duration_months != null ? `${p.symptom_duration_months} 個月` : null);
        set('f-diagnosis', p.diagnosis);
        set('f-chief-complaint', p.chief_complaint);
        set('f-aggravating-factors', p.aggravating_factors);
        set('f-medical-history', p.medical_history);
        set('f-imaging-findings', p.imaging_findings);
        set('f-visit-flow', p.visit_flow);

        const hasTx = p.other_knee_treatment_comment != null;
        document.getElementById('otherTx-yes').checked = hasTx;
        document.getElementById('otherTx-no').checked  = !hasTx;
        const txDiv = document.getElementById('otherTx-txt');
        if (hasTx) {
          txDiv.textContent   = p.other_knee_treatment_comment;
          txDiv.style.display = 'block';
        } else {
          txDiv.style.display = 'none';
        }

        const ciEl = document.getElementById('f-contraindications');
        const cis  = p.contraindications;
        if (cis && cis.length > 0) {
          try {
            const ciRes  = await fetch(`${API_URL}/contraindications`);
            const ciData = await ciRes.json();
            const ciMap  = {};
            (ciData.data || []).forEach(c => { ciMap[c.id] = c.name; });
            ciEl.textContent = cis.map(c => ciMap[typeof c === 'object' ? c.id : c] || String(c)).join('、');
          } catch (_) {
            ciEl.textContent = cis.join('、');
          }
          ciEl.classList.remove('empty');
        } else {
          ciEl.textContent = '無';
          ciEl.classList.add('empty');
        }
      } catch (e) {
        if ((_retry.loadPatient || 0) < MAX_RETRIES) {
          _retry.loadPatient = (_retry.loadPatient || 0) + 1;
          alert(`伺服器資料庫啟動中，請稍後再試 (${_retry.loadPatient}/${MAX_RETRIES})`);
          setTimeout(loadPatient, 3000);
        } else { _retry.loadPatient = 0; alert('伺服器資料庫啟動中...'); }
      }
    }

    const SIDE_LABEL = { 0: '左膝', 1: '右膝' };

    /* ════ 治療計畫 JS ════ */
    const WEEK_ORD = ['一','二','三','四','五','六','七','八','九','十','十一','十二'];

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function buildWeekData(treatment, exerciseMap) {
      const ONE_DAY = 86400;
      const ONE_WEEK = 7 * ONE_DAY;
      const weeks = [];
      let ws = treatment.start_time;
      while (ws <= treatment.end_time) {
        const we = Math.min(ws + ONE_WEEK - ONE_DAY, treatment.end_time);
        weeks.push({ start: ws, end: we, items: {} });
        ws += ONE_WEEK;
      }
      (treatment.contents || []).forEach(c => {
        const wi = weeks.findIndex(w => c.date >= w.start && c.date <= w.end + ONE_DAY - 1);
        if (wi === -1) return;
        const key = c.exercise_id;
        if (!weeks[wi].items[key]) {
          const hasEs = c.es_intensity != null || c.es_frequency != null || c.es_pulse_width != null;
          weeks[wi].items[key] = {
            name: exerciseMap[c.exercise_id] || `動作 ${c.exercise_id}`,
            params: `組數：${c.sets}，次數：${c.reps}，組間休息：${c.set_rest_time}秒`,
            esParams: hasEs
              ? `電刺激強度：${c.es_intensity ?? '—'}mA，電刺激頻率：${c.es_frequency ?? '—'}Hz，電刺激脈寬：${c.es_pulse_width ?? '—'}μs`
              : null,
            days: []
          };
        }
        const d = new Date(c.date * 1000);
        weeks[wi].items[key].days.push(`${d.getMonth()+1}/${d.getDate()}`);
      });
      return weeks.map(w => ({
        range: `${tsToDateStr(w.start)} → ${tsToDateStr(w.end)}`,
        items: Object.values(w.items)
      }));
    }

    function renderPlans(plans, exerciseMap) {
      const list  = document.getElementById('planList');

      list.innerHTML = '';
      if (!plans.length) { empty.style.display = 'block'; return; }
      empty.style.display = 'none';

      plans.forEach(plan => {
        const weekData = buildWeekData(plan, exerciseMap);
        const period = `${tsToDateStr(plan.start_time)} → ${tsToDateStr(plan.end_time)}`;
        const createdAt = tsToDateStr(plan.created_at);
        const planHasEs = (plan.contents || []).some(c => c.es_intensity != null || c.es_frequency != null || c.es_pulse_width != null);

        const card = document.createElement('div');
        card.className = 'plan-card';

        const hdr = document.createElement('div');
        hdr.className = 'plan-card-header';
        hdr.innerHTML = `
          <div class="plan-card-header-title">
            <span class="plan-card-name">治療名稱：${escHtml(plan.name)}</span>
            ${planHasEs ? '<span class="es-badge">電刺激</span>' : ''}
          </div>
          <div class="plan-card-actions">
            <button class="plan-card-btn plan-card-btn-edit" onclick="location.href='edit_patient-treatment-plan.html?id=${patientId}&planId=${plan.id}'">編輯</button>
            <button class="plan-card-btn plan-card-btn-del" onclick="deletePlan(${plan.id})">刪除</button>
          </div>`;

        const body = document.createElement('div');
        body.className = 'plan-card-body';

        const metaBar = document.createElement('div');
        metaBar.className = 'plan-meta-bar';
        metaBar.innerHTML = `
          <div class="plan-meta-item">
            <span class="plan-meta-label">治療期間</span>
            <span class="plan-meta-value">${escHtml(period)}</span>
          </div>
          <div class="plan-meta-divider"></div>
          <div class="plan-meta-item">
            <span class="plan-meta-label">週數</span>
            <span class="plan-meta-value">${weekData.length} 週</span>
          </div>
          <div class="plan-meta-divider"></div>
          <div class="plan-meta-item">
            <span class="plan-meta-label">建立時間</span>
            <span class="plan-meta-value">${escHtml(createdAt)}</span>
          </div>`;
        const qrRow = document.createElement('div');
        qrRow.className = 'plan-qr-row';
        qrRow.innerHTML = `
          <button class="plan-card-btn plan-card-btn-edit" onclick="togglePlanQrCode(${plan.id})">⬛ QR Code</button>
          <div class="qrcode-area" id="planQr-${plan.id}" style="display:none; flex-direction:column; align-items:center; gap:8px; padding:12px; background:#F5FAFF; border-radius:8px; border:0.5px solid #B5D4F4; width:100%;">
            <img id="planQrImg-${plan.id}" src="" alt="QR Code" style="width:180px; height:180px;">
            <div class="qrcode-label">患者端應用程式掃描此 QR Code 以取得治療計畫</div>
          </div>`;
        body.appendChild(qrRow);
        body.appendChild(metaBar);

        const schedWrap = document.createElement('div');
        schedWrap.className = 'plan-schedule-wrap';
        const schedLabel = document.createElement('div');
        schedLabel.className = 'plan-schedule-label';
        schedLabel.textContent = '週次治療安排';
        schedWrap.appendChild(schedLabel);

        const tblWrap = document.createElement('div');
        tblWrap.className = 'plan-table-wrap';
        const tbl = document.createElement('table');
        tbl.className = 'plan-table';
        tbl.innerHTML = `<thead><tr><th class="col-week">週次</th><th>治療內容</th></tr></thead>`;

        const tbody = document.createElement('tbody');
        weekData.forEach((week, wi) => {
          const [ws, we] = week.range.split(' → ');
          const tr = document.createElement('tr');
          const tdWeek = document.createElement('td');
          tdWeek.className = 'td-week';
          tdWeek.innerHTML = `<span class="plan-week-badge">第${WEEK_ORD[wi]||wi+1}週</span><br><span class="plan-week-range">${escHtml(ws)}<br>→ ${escHtml(we)}</span>`;
          const tdContent = document.createElement('td');
          if (!week.items.length) {
            tdContent.innerHTML = '<span class="no-ex">本週尚未設定治療項目</span>';
          } else {
            const ul = document.createElement('ul');
            ul.className = 'ex-list';
            week.items.forEach(item => {
              const li = document.createElement('li');
              li.className = 'ex-item';
              const dayTagsHtml = item.days && item.days.length
                ? `<div class="ex-day-tags">${item.days.map(d=>`<span class="ex-day-tag">${d}</span>`).join('')}</div>`
                : '';
              const esHtml = item.esParams ? `<span class="ex-es-params">${escHtml(item.esParams)}</span>` : '';
              li.innerHTML = `<span class="ex-bullet"></span><span><span class="ex-name">${escHtml(item.name)}</span><span class="ex-params">：${escHtml(item.params)}</span>${esHtml}${dayTagsHtml}</span>`;
              ul.appendChild(li);
            });
            tdContent.appendChild(ul);
          }
          tr.appendChild(tdWeek); tr.appendChild(tdContent); tbody.appendChild(tr);
        });
        tbl.appendChild(tbody);
        tblWrap.appendChild(tbl);
        schedWrap.appendChild(tblWrap);
        body.appendChild(schedWrap);

        card.appendChild(hdr); card.appendChild(body);
        list.appendChild(card);
      });
    }

        if (!res.ok) {
          if (res.status === 500 && (_retry.togglePlanQrCode || 0) < MAX_RETRIES) {
            _retry.togglePlanQrCode = (_retry.togglePlanQrCode || 0) + 1;
            alert(`伺服器資料庫啟動中，請稍後再試 (${_retry.togglePlanQrCode}/${MAX_RETRIES})`);
            setTimeout(() => togglePlanQrCode(planId), 3000);
          } else { _retry.togglePlanQrCode = 0; alert('無法取得 QR Code'); }
          return;
        }
        _retry.togglePlanQrCode = 0;
        const blob = await res.blob();
        document.getElementById(`planQrImg-${planId}`).src = URL.createObjectURL(blob);
      } catch (e) {
        if ((_retry.togglePlanQrCode || 0) < MAX_RETRIES) {
          _retry.togglePlanQrCode = (_retry.togglePlanQrCode || 0) + 1;
          alert(`伺服器資料庫啟動中，請稍後再試 (${_retry.togglePlanQrCode}/${MAX_RETRIES})`);
          setTimeout(() => togglePlanQrCode(planId), 3000);
        } else { _retry.togglePlanQrCode = 0; alert('伺服器資料庫啟動中...'); }
        return;
      }
      area.style.display = 'flex';
    }

    // keep-alive: ping /health every 10s to prevent Railway sleeping
        // keep-alive: ping /health every 10s to prevent Railway sleeping
    setInterval(async () => {
      try {
        const res = await fetch(`${API_URL}/health`);
        if (res.ok) {
          document.getElementById('connectionOverlay').style.display = 'none';
        } else {
          document.getElementById('connectionOverlay').style.display = 'flex';
        }
      } catch (e) {
        document.getElementById('connectionOverlay').style.display = 'flex';
      }
    }, 10000);
  </script>


  <!-- 連線失敗提示 -->
  <div id="connectionOverlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:9999; align-items:center; justify-content:center;">
    <div style="background:white; border-radius:12px; padding:32px 28px; text-align:center; display:flex; flex-direction:column; gap:14px; max-width:300px; box-shadow:0 8px 32px rgba(0,0,0,0.2);">
      <div style="font-size:16px; font-weight:600; color:#0C447C;">嘗試連線中</div>
      <div style="font-size:13px; color:#378ADD; line-height:1.6;">請確保在網路環境下操作</div>
      <button onclick="document.getElementById('connectionOverlay').style.display='none'" style="background:#185FA5; color:white; border:none; border-radius:6px; padding:10px 24px; font-size:14px; cursor:pointer; font-family:inherit; font-weight:500; margin-top:4px;">確定</button>
    </div>
  </div>
