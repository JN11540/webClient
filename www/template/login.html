<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>膝關節炎數位運動介入系統</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      min-height: 100vh;
      background: #ddeef8;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Microsoft JhengHei', '微軟正黑體', sans-serif;
    }

    .wrapper {
      width: 100%;
      max-width: 960px;
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 4rem;
      padding: 2rem 4rem;
    }

    .left-panel {
      flex: 1;
      text-align: center;
      min-width: 0;
    }

    @media (max-width: 860px) {
      .wrapper {
        flex-direction: column;
        padding: 3rem 2rem;
        gap: 2rem;
      }
      .left-panel {
        width: 100%;
      }
      .card {
        flex: unset !important;
        width: 100%;
        max-width: 480px;
      }
      h1 {
        font-size: 40px !important;
      }
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #1a3a5c;
      color: #b8d4f0;
      padding: 10px 28px;
      border-radius: 30px;
      font-size: 15px;
      letter-spacing: 0.14em;
      margin-bottom: 1.5rem;
      align-self: center;
    }

    .badge-dot {
      width: 9px;
      height: 9px;
      background: #5aa3e0;
      border-radius: 50%;
      display: inline-block;
    }

    h1 {
      font-size: 56px;
      font-weight: 700;
      color: #1a3a5c;
      line-height: 1.3;
      margin-bottom: 12px;
    }

    .subtitle {
      font-size: 22px;
      color: #5a7a9a;
      letter-spacing: 0.05em;
      margin-bottom: 0;
    }

    .card {
      flex: 0 0 420px;
      background: #ffffff;
      border-radius: 20px;
      border: 1px solid #c4d9ec;
      padding: 2.5rem 3rem;
      box-shadow: 0 6px 32px rgba(26, 58, 92, 0.1);
    }

    .field {
      margin-bottom: 1.25rem;
      text-align: left;
    }

    label {
      display: block;
      font-size: 22px;
      color: #5a7a9a;
      margin-bottom: 10px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 18px 20px;
      font-size: 20px;
      border: 1.5px solid #c4d9ec;
      border-radius: 10px;
      background: #f0f7fc;
      color: #1a3a5c;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      font-family: 'Microsoft JhengHei', '微軟正黑體', sans-serif;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: #378add;
      background: #ffffff;
    }

    .btn-primary {
      width: 100%;
      padding: 14px;
      background: #1a3a5c;
      color: #e8f2fb;
      border: none;
      border-radius: 10px;
      font-size: 22px;
      cursor: pointer;
      margin-bottom: 14px;
      font-family: 'Microsoft JhengHei', '微軟正黑體', sans-serif;
      font-weight: 600;
      transition: background 0.2s;
    }

    .btn-primary:hover { background: #0f2540; }

    .btn-secondary {
      width: 100%;
      padding: 13px;
      background: transparent;
      color: #1a3a5c;
      border: 1.5px solid #a0c0dc;
      border-radius: 10px;
      font-size: 22px;
      cursor: pointer;
      font-family: 'Microsoft JhengHei', '微軟正黑體', sans-serif;
      font-weight: 500;
      transition: background 0.2s;
    }

    .btn-secondary:hover { background: #eaf3fb; }

    .divider {
      border: none;
      border-top: 1px solid #ddeef8;
      margin: 1.5rem 0 1rem;
    }

    .footer-note {
      font-size: 15px;
      color: #8aacca;
      letter-spacing: 0.03em;
    }
  </style>
</head>
<body>
  <div class="wrapper">

    <div class="left-panel">
      <div class="badge">
        <span class="badge-dot"></span>
        RehabSync@master
      </div>
      <h1>膝關節炎<br>數位運動介入系統</h1>
      <p class="subtitle">Digital Intervention System for Arthritis</p>
    </div>

    <div class="card">
      <div class="field">
        <label for="username">臨床人員帳號</label>
        <input type="text" id="username">
      </div>
      <div class="field" style="margin-bottom: 1.5rem;">
        <label for="password">密碼</label>
        <input type="password" id="password">
      </div>
      <button class="btn-primary" onclick="submitLogin()">進入系統</button>
      <button class="btn-secondary" onclick="location.href='register.html'">註冊新帳號</button>
      <hr class="divider">
      <p class="footer-note">僅限授權臨床人員存取 · 所有操作均有記錄</p>
    </div>

  </div>

  <script>
    const API_URL = 'https://therapistclinical-production.up.railway.app';
    const MAX_RETRIES = 3;
    const _retry = {};
    async function submitLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();

      if (!username || !password) {
        alert('請輸入帳號與密碼');
        return;
      }

      try {
        const res = await fetch(`${API_URL}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
          redirect: 'manual',
        });

        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          if (res.status === 500 && (_retry.submitLogin || 0) < MAX_RETRIES) {
            _retry.submitLogin = (_retry.submitLogin || 0) + 1;
            alert(`伺服器資料庫啟動中，請稍後再試 (${_retry.submitLogin}/${MAX_RETRIES})`);
            setTimeout(submitLogin, 3000);
          } else {
            _retry.submitLogin = 0;
            alert(data.message || '登入失敗');
          }
          return;
          return;
        }
        // 200 OK with JSON
        _retry.submitLogin = 0;
        if (data.clinician_id) localStorage.setItem('clinician_id', String(data.clinician_id));
        location.href = 'home.html';
      } catch (e) {
        if ((_retry.submitLogin || 0) < MAX_RETRIES) {
          _retry.submitLogin = (_retry.submitLogin || 0) + 1;
          alert(`伺服器資料庫啟動中，請稍後再試 (${_retry.submitLogin}/${MAX_RETRIES})`);
          setTimeout(submitLogin, 3000);
        } else {
          _retry.submitLogin = 0;
          alert('伺服器資料庫啟動中...');
        }
        if ((_retry.submitLogin || 0) < MAX_RETRIES) {
          _retry.submitLogin = (_retry.submitLogin || 0) + 1;
          alert(`伺服器資料庫啟動中，請稍後再試 (${_retry.submitLogin}/${MAX_RETRIES})`);
          setTimeout(submitLogin, 3000);
        } else {
          _retry.submitLogin = 0;
          alert('伺服器資料庫啟動中...');
        }
      }
    }

    // keep-alive: ping /health every 10s to prevent Railway sleeping
    setInterval(async () => {
      try {
        const res = await fetch(`${API_URL}/health`);
        if (res.ok) {
          document.getElementById('connectionOverlay').style.display = 'none';
        } else {
          document.getElementById('connectionOverlay').style.display = 'flex';
        }
      } catch (e) {
        document.getElementById('connectionOverlay').style.display = 'flex';
      }
    }, 10000);
  </script>

  <!-- 連線失敗提示 -->
  <div id="connectionOverlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:9999; align-items:center; justify-content:center;">
    <div style="background:white; border-radius:12px; padding:32px 28px; text-align:center; display:flex; flex-direction:column; gap:14px; max-width:300px; box-shadow:0 8px 32px rgba(0,0,0,0.2);">
      <div style="font-size:16px; font-weight:600; color:#0C447C;">嘗試連線中</div>
      <div style="font-size:13px; color:#378ADD; line-height:1.6;">請確保在網路環境下操作</div>
      <button onclick="document.getElementById('connectionOverlay').style.display='none'" style="background:#185FA5; color:white; border:none; border-radius:6px; padding:10px 24px; font-size:14px; cursor:pointer; font-family:inherit; font-weight:500; margin-top:4px;">確定</button>
    </div>
  </div>
</body>
</html>
