<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>建立臨床人員帳號</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang TC', 'Noto Sans TC', sans-serif;
      background: #EBF4FC;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 20px;
    }

    .container {
      width: 100%;
      max-width: 560px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── 頁首 ── */
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .page-title {
      font-size: 20px;
      font-weight: 500;
      color: #0C447C;
    }

    .page-login-link {
      font-size: 12px;
      color: #378ADD;
      text-decoration: underline;
      cursor: pointer;
    }

    .page-login-link:hover { color: #185FA5; }

    /* ── 表單卡片 ── */
    .form-card {
      background: white;
      border-radius: 12px;
      border: 0.5px solid #B5D4F4;
      padding: 24px 28px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── 群組 ── */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .group-title {
      font-size: 10px;
      color: #185FA5;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding-bottom: 6px;
      border-bottom: 0.5px solid #E6F1FB;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .form-row.single {
      grid-template-columns: 1fr;
    }

    /* ── 欄位 ── */
    .form-field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .field-label {
      font-size: 11px;
      color: #185FA5;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 3px;
    }

    .required {
      color: #E24B4A;
      font-size: 10px;
    }

    .optional {
      color: #888780;
      font-size: 10px;
      font-weight: 400;
    }

    .field-input {
      width: 100%;
      background: #EBF4FC;
      border: 1px solid #B5D4F4;
      border-radius: 6px;
      padding: 9px 12px;
      font-size: 13px;
      color: #0C447C;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      font-family: inherit;
    }

    .field-input:focus {
      border-color: #185FA5;
      background: #daeaf8;
    }

    .field-input::placeholder { color: #B5D4F4; }

    /* ── 分隔線 ── */
    .divider {
      border: none;
      border-top: 0.5px solid #E6F1FB;
    }

    /* ── 送出按鈕 ── */
    .btn-submit {
      width: 100%;
      background: #185FA5;
      color: white;
      border: none;
      border-radius: 7px;
      padding: 12px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: background 0.2s;
      font-family: inherit;
    }

    .btn-submit:hover { background: #0C447C; }
    .btn-submit:active { background: #042C53; }

    /* ── 底部說明 ── */
    .footer-note {
      font-size: 10px;
      color: #378ADD;
      text-align: center;
      line-height: 1.7;
    }

    .footer-note span { color: #E24B4A; }
  </style>
</head>
<body>
  <div class="container">

    <div class="page-header">
      <div class="page-title">建立臨床人員帳號</div>
      <a class="page-login-link" href="/">已有帳號？登入</a>
    </div>

    <div class="form-card">

      <!-- 帳號資訊 -->
      <div class="form-group">
        <div class="group-title">帳號資訊</div>
        <div class="form-row">
          <div class="form-field">
            <label class="field-label">姓名 <span class="required">✱</span></label>
            <input class="field-input" type="text" name="name">
          </div>
          <div class="form-field">
            <label class="field-label">登入帳號 <span class="required">✱</span></label>
            <input class="field-input" type="text" name="username">
          </div>
        </div>
        <div class="form-row">
          <div class="form-field">
            <label class="field-label">密碼 <span class="required">✱</span></label>
            <input class="field-input" type="password" name="password">
          </div>
          <div class="form-field">
            <label class="field-label">確認密碼 <span class="required">✱</span></label>
            <input class="field-input" type="password" name="password_confirm">
          </div>
        </div>
      </div>

      <hr class="divider">

      <!-- 執業資訊 -->
      <div class="form-group">
        <div class="group-title">執業資訊</div>
        <div class="form-row">
          <div class="form-field">
            <label class="field-label">所屬機構 <span class="required">選填</span></label>
            <input class="field-input" type="text" name="institution">
          </div>
          <div class="form-field">
            <label class="field-label">科別 <span class="optional">選填</span></label>
            <input class="field-input" type="text" name="department">
          </div>
        </div>
        <div class="form-row">
          <div class="form-field">
            <label class="field-label">職種 <span class="optional">選填</span></label>
            <input class="field-input" type="text" name="profession">
          </div>
          <div class="form-field">
            <label class="field-label">專科 <span class="optional">選填</span></label>
            <input class="field-input" type="text" name="specialty">
          </div>
        </div>
        <div class="form-row">
          <div class="form-field">
            <label class="field-label">年資（年）<span class="optional">選填</span></label>
            <input class="field-input" type="number" min="0" name="years_of_experience">
          </div>
          <div class="form-field">
            <label class="field-label">診間地點 <span class="optional">選填</span></label>
            <input class="field-input" type="text" name="clinic_location">
          </div>
        </div>
      </div>

      <hr class="divider">

      <!-- 聯絡資訊 -->
      <div class="form-group">
        <div class="group-title">聯絡資訊</div>
        <div class="form-row">
          <div class="form-field">
            <label class="field-label">電子信箱 <span class="optional">選填</span></label>
            <input class="field-input" type="email" name="email">
          </div>
          <div class="form-field">
            <label class="field-label">電話 <span class="optional">選填</span></label>
            <input class="field-input" type="tel" name="phone">
          </div>
        </div>
      </div>

      <hr class="divider">

      <button class="btn-submit" onclick="submitRegister()">送出註冊</button>

    </div>

    <div class="footer-note">
      <span>✱</span> 為必填欄位 · 僅限授權臨床人員申請
    </div>

  </div>
  <script>
    const API_URL = 'https://therapistclinical-production.up.railway.app';
    async function submitRegister() {
      const get = name => document.querySelector(`[name="${name}"]`).value.trim();

      const name = get('name');
      const username = get('username');
      const password = get('password');
      const passwordConfirm = get('password_confirm');

      if (!name || !username || !password) {
        alert('請填寫姓名、登入帳號與密碼');
        return;
      }
      if (password !== passwordConfirm) {
        alert('密碼與確認密碼不一致');
        return;
      }

      const yearsRaw = get('years_of_experience');
      const body = {
        name,
        username,
        password,
        institution: get('institution') || null,
        department: get('department') || null,
        profession: get('profession') || null,
        specialty: get('specialty') || null,
        years_of_experience: yearsRaw !== '' ? parseInt(yearsRaw) : null,
        clinic_location: get('clinic_location') || null,
        email: get('email') || null,
        phone: get('phone') || null,
      };

      const res = await fetch(`${API_URL}/clinicians`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });

      const data = await res.json();
      if (data.result) {
        location.href = 'login.html';
      } else {
        alert(data.message || '註冊失敗');
      }
    }
  </script>
</body>
</html>
