<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>建立臨床人員帳號</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #dce8f5;
      padding: 2rem;
      font-family: 'Microsoft JhengHei', '微軟正黑體', sans-serif;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .header h1 {
      font-size: 32px;
      font-weight: 700;
      color: #1a3a5c;
    }

    .header a {
      font-size: 20px;
      color: #1e5fa8;
      text-decoration: underline;
    }

    .header a:hover { color: #174d8a; }

    .card {
      background: #fff;
      border-radius: 16px;
      border: 0.5px solid #c8d8ec;
      padding: 2rem 2.5rem;
    }

    .section { margin-bottom: 1.75rem; }

    .section-label {
      font-size: 20px;
      font-weight: 700;
      color: #1e5fa8;
      letter-spacing: 0.04em;
      margin-bottom: 1.25rem;
      padding-bottom: 0.5rem;
      border-bottom: 1.5px solid #c5d9f0;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .field label {
      font-size: 20px;
      color: #555;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .required { color: #e03a3a; font-size: 18px; }
    .optional { font-size: 16px; color: #999; font-weight: 400; }

    .field input {
      height: 52px;
      padding: 0 14px;
      border: 1px solid #c8d8ec;
      border-radius: 8px;
      font-size: 20px;
      background: #f4f8fd;
      color: #1a1a1a;
      outline: none;
      transition: border-color 0.15s, background 0.15s;
      font-family: 'Microsoft JhengHei', '微軟正黑體', sans-serif;
    }

    .field input:focus {
      border-color: #1e5fa8;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(30,95,168,0.1);
    }

    .field input::placeholder { color: #aec4de; }

    .submit-btn {
      width: 100%;
      height: 54px;
      background: #1e5fa8;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 20px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 0.5rem;
      letter-spacing: 0.03em;
      transition: background 0.15s, transform 0.1s;
      font-family: 'Microsoft JhengHei', '微軟正黑體', sans-serif;
    }

    .submit-btn:hover { background: #174d8a; }
    .submit-btn:active { transform: scale(0.99); }

    .footer-note {
      text-align: center;
      font-size: 16px;
      color: #888;
      margin-top: 1.25rem;
    }

    .footer-note span { color: #e03a3a; }
  </style>
</head>
<body>

  <div class="header">
    <h1>建立臨床人員帳號</h1>
    <a href="/">已有帳號？登入</a>
  </div>

  <div class="card">

    <!-- 帳號資訊 -->
    <div class="section">
      <div class="section-label">帳號資訊</div>
      <div class="grid-2">
        <div class="field">
          <label>姓名 <span class="required">*</span></label>
          <input type="text" name="name">
        </div>
        <div class="field">
          <label>登入帳號 <span class="required">*</span></label>
          <input type="text" name="username">
        </div>
        <div class="field">
          <label>密碼 <span class="required">*</span></label>
          <input type="password" name="password">
        </div>
        <div class="field">
          <label>確認密碼 <span class="required">*</span></label>
          <input type="password" name="password_confirm">
        </div>
      </div>
    </div>

    <!-- 執業資訊 -->
    <div class="section">
      <div class="section-label">執業資訊</div>
      <div class="grid-2">
        <div class="field">
          <label>所屬機構 <span class="optional">選填</span></label>
          <input type="text" name="institution">
        </div>
        <div class="field">
          <label>科別 <span class="optional">選填</span></label>
          <input type="text" name="department">
        </div>
        <div class="field">
          <label>職種 <span class="optional">選填</span></label>
          <input type="text" name="profession">
        </div>
        <div class="field">
          <label>專科 <span class="optional">選填</span></label>
          <input type="text" name="specialty">
        </div>
        <div class="field">
          <label>年資（年） <span class="optional">選填</span></label>
          <input type="number" min="0" name="years_of_experience">
        </div>
        <div class="field">
          <label>診間地點 <span class="optional">選填</span></label>
          <input type="text" name="clinic_location">
        </div>
      </div>
    </div>

    <!-- 聯絡資訊 -->
    <div class="section" style="margin-bottom: 1.25rem;">
      <div class="section-label">聯絡資訊</div>
      <div class="grid-2">
        <div class="field">
          <label>電子信箱 <span class="optional">選填</span></label>
          <input type="email" name="email">
        </div>
        <div class="field">
          <label>電話 <span class="optional">選填</span></label>
          <input type="tel" name="phone">
        </div>
      </div>
    </div>

    <button class="submit-btn" onclick="submitRegister()">送出註冊</button>

  </div>

  <p class="footer-note"><span>*</span> 為必填欄位，僅限授權臨床人員申請</p>

  <script>
    const API_URL = 'https://therapistclinical-production.up.railway.app';
    const MAX_RETRIES = 3;
    const _retry = {};
    async function submitRegister() {
      const get = name => document.querySelector(`[name="${name}"]`).value.trim();

      const name     = get('name');
      const username = get('username');
      const password = get('password');
      const passwordConfirm = get('password_confirm');

      if (!name || !username || !password) {
        alert('請填寫姓名、登入帳號與密碼');
        return;
      }
      if (password !== passwordConfirm) {
        alert('密碼與確認密碼不一致');
        return;
      }

      const yearsRaw = get('years_of_experience');
      const body = {
        name,
        username,
        password,
        institution: get('institution') || null,
        department: get('department') || null,
        profession: get('profession') || null,
        specialty: get('specialty') || null,
        years_of_experience: yearsRaw !== '' ? parseInt(yearsRaw) : null,
        clinic_location: get('clinic_location') || null,
        email: get('email') || null,
        phone: get('phone') || null,
      };

      try {
        const res = await fetch(`${API_URL}/clinicians`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });

        const data = await res.json();
        if (!res.ok) {
          if (res.status === 500 && (_retry.submitRegister || 0) < MAX_RETRIES) {
            _retry.submitRegister = (_retry.submitRegister || 0) + 1;
            alert(`伺服器資料庫啟動中，請稍後再試 (${_retry.submitRegister}/${MAX_RETRIES})`);
            setTimeout(submitRegister, 3000);
          } else {
            _retry.submitRegister = 0;
            alert(data.message || '註冊失敗');
          }
          return;
        }
        _retry.submitRegister = 0;
        if (!res.ok) {
          if (res.status === 500 && (_retry.submitRegister || 0) < MAX_RETRIES) {
            _retry.submitRegister = (_retry.submitRegister || 0) + 1;
            alert(`伺服器資料庫啟動中，請稍後再試 (${_retry.submitRegister}/${MAX_RETRIES})`);
            setTimeout(submitRegister, 3000);
          } else {
            _retry.submitRegister = 0;
            alert(data.message || '註冊失敗');
          }
          return;
        }
        _retry.submitRegister = 0;
        if (data.result) {
          location.href = 'login.html';
        } else {
          alert(data.message || '註冊失敗');
        }
      } catch (e) {
        if ((_retry.submitRegister || 0) < MAX_RETRIES) {
          _retry.submitRegister = (_retry.submitRegister || 0) + 1;
          alert(`伺服器資料庫啟動中，請稍後再試 (${_retry.submitRegister}/${MAX_RETRIES})`);
          setTimeout(submitRegister, 3000);
        } else {
          _retry.submitRegister = 0;
          alert('伺服器資料庫啟動中...');
        }
        if ((_retry.submitRegister || 0) < MAX_RETRIES) {
          _retry.submitRegister = (_retry.submitRegister || 0) + 1;
          alert(`伺服器資料庫啟動中，請稍後再試 (${_retry.submitRegister}/${MAX_RETRIES})`);
          setTimeout(submitRegister, 3000);
        } else {
          _retry.submitRegister = 0;
          alert('伺服器資料庫啟動中...');
        }
      }
    }

    // keep-alive
    setInterval(async () => {
      try {
        const res = await fetch(`${API_URL}/health`);
        if (res.ok) {
          document.getElementById('connectionOverlay').style.display = 'none';
        } else {
          document.getElementById('connectionOverlay').style.display = 'flex';
        }
      } catch (e) {
        document.getElementById('connectionOverlay').style.display = 'flex';
      }
    }, 10000);
  </script>

  <!-- 連線失敗提示 -->
  <div id="connectionOverlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:9999; align-items:center; justify-content:center;">
    <div style="background:white; border-radius:12px; padding:32px 28px; text-align:center; display:flex; flex-direction:column; gap:14px; max-width:300px; box-shadow:0 8px 32px rgba(0,0,0,0.2);">
      <div style="font-size:16px; font-weight:600; color:#0C447C;">嘗試連線中</div>
      <div style="font-size:13px; color:#378ADD; line-height:1.6;">請確保在網路環境下操作</div>
      <button onclick="document.getElementById('connectionOverlay').style.display='none'" style="background:#185FA5; color:white; border:none; border-radius:6px; padding:10px 24px; font-size:14px; cursor:pointer; font-family:inherit; font-weight:500; margin-top:4px;">確定</button>
    </div>
  </div>

</body>
</html>
