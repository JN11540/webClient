<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新增個案</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Microsoft JhengHei', '微軟正黑體', sans-serif;
      background: #deeaf5;
      min-height: 100vh;
      padding: 16px;
    }

    .topbar {
      display: flex;
      align-items: center;
      margin-bottom: 14px;
    }

    .back-link {
      font-size: 20px;
      color: #2a6db5;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 4px;
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
      transition: color 0.15s;
    }
    .back-link:hover { color: #185FA5; }

    .title {
      flex: 1;
      text-align: center;
      font-size: 32px;
      font-weight: bold;
      color: #1a1a1a;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .panel {
      background: #fff;
      border-radius: 12px;
      border: 0.5px solid #c5d8ee;
      padding: 20px 22px;
    }

    .panel-title {
      font-size: 20px;
      font-weight: bold;
      color: #2a6db5;
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 0.5px solid #c5d8ee;
    }

    .field { margin-bottom: 16px; }
    .field:last-child { margin-bottom: 0; }

    .label {
      font-size: 20px;
      color: #1a1a1a;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .req { color: #e24b4a; font-size: 18px; }
    .opt { font-size: 16px; color: #888; margin-left: 2px; }

    input[type=text],
    input[type=email],
    input[type=date],
    input[type=number],
    input[type=tel],
    textarea {
      width: 100%;
      padding: 0 14px;
      height: 52px;
      font-size: 20px;
      border: 0.5px solid #b8cfe8;
      border-radius: 8px;
      background: #eef4fb;
      color: #1a1a1a;
      outline: none;
      font-family: 'Microsoft JhengHei', '微軟正黑體', sans-serif;
      transition: border-color 0.15s;
    }

    textarea {
      height: auto;
      padding: 12px 14px;
      resize: vertical;
      line-height: 1.5;
    }

    input:focus, textarea:focus {
      border-color: #378add;
      box-shadow: 0 0 0 2px rgba(55, 138, 221, 0.15);
    }

    .radio-group {
      display: flex;
      gap: 24px;
      align-items: center;
      padding: 6px 0;
    }

    .radio-group label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 20px;
      cursor: pointer;
      color: #1a1a1a;
    }

    .radio-group input[type=radio] {
      width: 20px;
      height: 20px;
      accent-color: #378add;
      cursor: pointer;
    }

    .row2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    #knee-detail {
      margin-top: 10px;
      padding: 12px 14px;
      background: #eef4fb;
      border: 0.5px solid #b8cfe8;
      border-radius: 8px;
      display: none;
    }

    #knee-detail .label {
      font-size: 20px;
      color: #2a6db5;
      margin-bottom: 6px;
    }

    .footer-area {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
    }

    .footer-note {
      font-size: 18px;
      color: #e24b4a;
    }

    .btn-row { display: flex; gap: 10px; }

    .btn-cancel {
      font-size: 20px;
      background: white;
      color: #2a6db5;
      border: 0.5px solid #b8cfe8;
      border-radius: 8px;
      padding: 10px 28px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }
    .btn-cancel:hover { background: #eef4fb; }

    .btn-submit {
      font-size: 20px;
      font-weight: bold;
      background: #185FA5;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 28px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }
    .btn-submit:hover { background: #0C447C; }
    .btn-submit:active { background: #042C53; }

    @media (max-width: 640px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- 頁首 -->
    <div class="page-header">
      <button class="btn-back" onclick="location.href='home.html'">← 返回首頁</button>
      <div class="page-title">新增個案</div>
      <div class="header-spacer"></div>
    </div>

  <div class="grid">

    <!-- 左欄：基本資料 -->
    <div class="panel">
      <div class="panel-title">基本資料</div>

      <div class="field">
        <div class="label">姓名 <span class="req">*</span></div>
        <input type="text" name="name">
      </div>

      <div class="field">
        <div class="label">Email <span class="req">*</span></div>
        <input type="email" name="email">
      </div>

      <div class="row2">
        <div class="field">
          <div class="label">身高（公分）<span class="req">*</span></div>
          <input type="number" name="height" min="0" step="0.1">
        </div>
        <div class="field">
          <div class="label">體重（公斤）<span class="req">*</span></div>
          <input type="number" name="weight" min="0" step="0.1">
        </div>
      </div>

      <div class="field">
        <div class="label">電話 <span class="req">*</span></div>
        <input type="tel" name="phone">
      </div>

      <div class="field">
        <div class="label">出生日期 <span class="req">*</span></div>
        <input type="date" name="date_of_birth">
      </div>

      <div class="field">
        <div class="label">性別 <span class="req">*</span></div>
        <div class="radio-group">
          <label><input type="radio" name="gender" value="0"> 女（Female）</label>
          <label><input type="radio" name="gender" value="1"> 男（Male）</label>
        </div>
      </div>

      <div class="field">
        <div class="label">職業 <span class="opt">選填</span></div>
        <input type="text" name="profession">
      </div>
    </div>

    <!-- 右欄：臨床資訊 -->
    <div class="panel">
      <div class="panel-title">臨床資訊</div>

      <div class="field">
        <div class="label">診斷 <span class="req">*</span></div>
        <input type="text" name="diagnosis">
      </div>

      <div class="row2">
        <div class="field">
          <div class="label">KL Grade（X 光分級）<span class="opt">選填</span></div>
          <input type="number" name="kl_grade" min="0" max="4">
        </div>
        <div class="field">
          <div class="label">病程（月）<span class="opt">選填</span></div>
          <input type="number" name="symptom_duration_months" min="0">
        </div>
      </div>

      <div class="field">
        <div class="label">主訴 <span class="opt">選填</span></div>
        <textarea name="chief_complaint" rows="3"></textarea>
      </div>

      <div class="field">
        <div class="label">加重因素 <span class="opt">選填</span></div>
        <textarea name="aggravating_factors" rows="3"></textarea>
      </div>

      <div class="field">
        <div class="label">相關病史 <span class="opt">選填</span></div>
        <textarea name="medical_history" rows="3"></textarea>
      </div>

      <div class="field">
        <div class="label">影像學結果 <span class="opt">選填</span></div>
        <textarea name="imaging_findings" rows="3"></textarea>
      </div>

      <div class="field">
        <div class="label">就診流程紀錄 <span class="opt">選填</span></div>
        <textarea name="visit_flow" rows="3"></textarea>
      </div>

      <div class="field">
        <div class="label">是否有接受其他膝蓋治療 <span class="opt">選填</span></div>
        <div class="radio-group">
          <label><input type="radio" name="otherTx" value="yes" id="otherTx-yes"> 是</label>
          <label><input type="radio" name="otherTx" value="no" id="otherTx-no" checked> 否</label>
        </div>
        <div id="knee-detail">
          <div class="label">請描述接受過的治療內容</div>
          <textarea name="other_knee_treatment_comment" id="otherTx-textarea" rows="4"></textarea>
        </div>
      </div>
    </div>

  </div>

  <div class="footer-area">
    <div class="footer-note">* 為必填欄位</div>
    <div class="btn-row">
      <button class="btn-cancel" onclick="location.href='home.html'">取消</button>
      <button class="btn-submit" onclick="submitPatient()">新增個案</button>
    </div>
  </div>

  <script>
    const API_URL = 'https://therapistclinical-production.up.railway.app';
    const MAX_RETRIES = 3;
    const _retry = {};
    const clinicianId = localStorage.getItem('clinician_id');

    function field(name) {
      return document.querySelector(`[name="${name}"]`);
    }

    async function submitPatient() {

      const name = field('name').value.trim();
      const email = field('email').value.trim();
      const height = field('height').value;
      const weight = field('weight').value;
      const phone = field('phone').value.trim();
      const dob = field('date_of_birth').value;
      const genderEl = document.querySelector('[name="gender"]:checked');
      const diagnosis = field('diagnosis').value.trim();


      const dobTimestamp = Math.floor(new Date(dob).getTime() / 1000);

      const body = {
        clinician_id: parseInt(clinicianId),
        name,
        email,
        height: parseFloat(height),
        weight: parseFloat(weight),
        phone,
        date_of_birth: dobTimestamp,
        gender: parseInt(genderEl.value),
        diagnosis,
        profession: field('profession').value.trim() || null,
        kl_grade: field('kl_grade').value !== '' ? parseInt(field('kl_grade').value) : null,
        chief_complaint: field('chief_complaint').value.trim() || null,
        aggravating_factors: field('aggravating_factors').value.trim() || null,
        medical_history: field('medical_history').value.trim() || null,
        imaging_findings: field('imaging_findings').value.trim() || null,
        symptom_duration_months: field('symptom_duration_months').value !== '' ? parseInt(field('symptom_duration_months').value) : null,
        visit_flow: field('visit_flow').value.trim() || null,
        other_knee_treatment_comment: document.getElementById('otherTx-yes').checked
          ? (document.getElementById('otherTx-textarea').value.trim() || null)
          : null,
      };

      try {
        const res = await fetch(`${API_URL}/patients`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        if (!res.ok) {
          if (res.status === 500 && (_retry.submitPatient || 0) < MAX_RETRIES) {
            _retry.submitPatient = (_retry.submitPatient || 0) + 1;
            alert(`伺服器資料庫啟動中，請稍後再試 (${_retry.submitPatient}/${MAX_RETRIES})`);
            setTimeout(submitPatient, 3000);
          } else { _retry.submitPatient = 0; alert(data.message || '送出失敗'); }
          return;
        }
        _retry.submitPatient = 0;
        if (data.result) { location.href = 'home.html'; } else { alert(data.message); }
      } catch (e) {
        if ((_retry.submitPatient || 0) < MAX_RETRIES) {
          _retry.submitPatient = (_retry.submitPatient || 0) + 1;
          alert(`伺服器資料庫啟動中，請稍後再試 (${_retry.submitPatient}/${MAX_RETRIES})`);
          setTimeout(submitPatient, 3000);
        } else { _retry.submitPatient = 0; alert('伺服器資料庫啟動中...'); }
      }
    }

    document.getElementById('otherTx-yes').addEventListener('change', function () {
      document.getElementById('knee-detail').style.display = 'block';
    });
    document.getElementById('otherTx-no').addEventListener('change', function () {
      document.getElementById('knee-detail').style.display = 'none';
    });

    // keep-alive
    setInterval(async () => {
      try {
        const res = await fetch(`${API_URL}/health`);
        if (res.ok) {
          document.getElementById('connectionOverlay').style.display = 'none';
        } else {
          document.getElementById('connectionOverlay').style.display = 'flex';
        }
      } catch (e) {
        document.getElementById('connectionOverlay').style.display = 'flex';
      }
    }, 10000);
  </script>

  <!-- 連線失敗提示 -->
  <div id="connectionOverlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:9999; align-items:center; justify-content:center;">
    <div style="background:white; border-radius:12px; padding:32px 28px; text-align:center; display:flex; flex-direction:column; gap:14px; max-width:300px; box-shadow:0 8px 32px rgba(0,0,0,0.2);">
      <div style="font-size:16px; font-weight:600; color:#0C447C;">嘗試連線中</div>
      <div style="font-size:13px; color:#378ADD; line-height:1.6;">請確保在網路環境下操作</div>
      <button onclick="document.getElementById('connectionOverlay').style.display='none'" style="background:#185FA5; color:white; border:none; border-radius:6px; padding:10px 24px; font-size:14px; cursor:pointer; font-family:inherit; font-weight:500; margin-top:4px;">確定</button>
    </div>
  </div>

</body>
</html>
