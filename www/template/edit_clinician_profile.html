<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>編輯個人資料</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #dce8f5;
      padding: 2rem;
      font-family: 'Microsoft JhengHei', '微軟正黑體', sans-serif;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .header h1 {
      font-size: 32px;
      font-weight: 700;
      color: #1a3a5c;
    }

    .btn-back {
      font-size: 20px;
      color: #1e5fa8;
      background: none;
      border: none;
      cursor: pointer;
      text-decoration: underline;
      font-family: 'Microsoft JhengHei', '微軟正黑體', sans-serif;
      transition: color 0.15s;
    }
    .btn-back:hover { color: #174d8a; }

    .card {
      background: #fff;
      border-radius: 16px;
      border: 0.5px solid #c8d8ec;
      padding: 2rem 2.5rem;
    }

    .section { margin-bottom: 1.75rem; }

    .section-label {
      font-size: 20px;
      font-weight: 700;
      color: #1e5fa8;
      letter-spacing: 0.04em;
      margin-bottom: 1.25rem;
      padding-bottom: 0.5rem;
      border-bottom: 1.5px solid #c5d9f0;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
    }

    .grid-1 {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.25rem;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .field label {
      font-size: 20px;
      color: #555;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .required { color: #e03a3a; font-size: 18px; }
    .optional { font-size: 16px; color: #999; font-weight: 400; }

    .field input {
      height: 52px;
      padding: 0 14px;
      border: 1px solid #c8d8ec;
      border-radius: 8px;
      font-size: 20px;
      background: #f4f8fd;
      color: #1a1a1a;
      outline: none;
      transition: border-color 0.15s, background 0.15s;
      font-family: 'Microsoft JhengHei', '微軟正黑體', sans-serif;
    }

    .field input:focus {
      border-color: #1e5fa8;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(30,95,168,0.1);
    }

    .field input::placeholder { color: #aec4de; }

    .btn-row {
      display: flex;
      gap: 12px;
      margin-top: 0.5rem;
    }

    .btn-cancel {
      flex: 1;
      height: 54px;
      background: #fff;
      color: #1e5fa8;
      border: 1.5px solid #a0c0dc;
      border-radius: 10px;
      font-size: 20px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Microsoft JhengHei', '微軟正黑體', sans-serif;
      transition: background 0.15s;
    }
    .btn-cancel:hover { background: #eaf3fb; }

    .btn-save {
      flex: 1;
      height: 54px;
      background: #1e5fa8;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 20px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Microsoft JhengHei', '微軟正黑體', sans-serif;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-save:hover { background: #174d8a; }
    .btn-save:active { transform: scale(0.99); }

    .footer-note {
      text-align: center;
      font-size: 16px;
      color: #888;
      margin-top: 1.25rem;
    }

    .footer-note span { color: #e03a3a; }
  </style>
</head>
<body>

  <div class="header">
    <h1>編輯個人資料</h1>
    <button class="btn-back" onclick="location.href='/home'">← 返回首頁</button>
  </div>

  <div class="card">

    <!-- 基本資料 -->
    <div class="section">
      <div class="section-label">基本資料</div>
      <div class="grid-1">
        <div class="field">
          <label>姓名 <span class="required">*</span></label>
          <input type="text" name="name">
        </div>
      </div>
    </div>

    <!-- 執業資訊 -->
    <div class="section">
      <div class="section-label">執業資訊</div>
      <div class="grid-2">
        <div class="field">
          <label>所屬機構 <span class="optional">選填</span></label>
          <input type="text" name="institution">
        </div>
        <div class="field">
          <label>科別 <span class="optional">選填</span></label>
          <input type="text" name="department">
        </div>
        <div class="field">
          <label>職種 <span class="optional">選填</span></label>
          <input type="text" name="profession">
        </div>
        <div class="field">
          <label>專科 <span class="optional">選填</span></label>
          <input type="text" name="specialty">
        </div>
        <div class="field">
          <label>年資（年） <span class="optional">選填</span></label>
          <input type="number" min="0" name="years_of_experience">
        </div>
        <div class="field">
          <label>診間地點 <span class="optional">選填</span></label>
          <input type="text" name="clinic_location">
        </div>
      </div>
    </div>

    <!-- 聯絡資訊 -->
    <div class="section" style="margin-bottom: 1.25rem;">
      <div class="section-label">聯絡資訊</div>
      <div class="grid-2">
        <div class="field">
          <label>電子信箱 <span class="optional">選填</span></label>
          <input type="email" name="email">
        </div>
        <div class="field">
          <label>電話 <span class="optional">選填</span></label>
          <input type="tel" name="phone">
        </div>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn-cancel" onclick="location.href='/home'">取消</button>
      <button class="btn-save" onclick="submitEdit()">儲存變更</button>
    </div>

  </div>

  <p class="footer-note"><span>*</span> 為必填欄位</p>

  <script>
    function getCookie(name) {
      const match = document.cookie.match(new RegExp('(?:^|; )' + name + '=([^;]*)'));
      return match ? decodeURIComponent(match[1]) : null;
    }

    function field(name) {
      return document.querySelector(`[name="${name}"]`);
    }

    async function loadProfile() {
      const clinicianId = getCookie('clinician_id');
      const sessionId   = getCookie('session_id');
      if (!clinicianId || !sessionId) {
        alert('cookie 不存在：clinician_id 或 session_id 遺失');
        return;
      }
      try {
        const res  = await fetch(`/clinicians/${clinicianId}`, { headers: { 'Authorization': `Bearer ${sessionId}` } });
        const data = await res.json();
        if (!res.ok) {
          alert(data.message || '操作失敗'); return;
        }
        if (!data.result) { alert(data.message); return; }
        const c = data.data;
        field('name').value                = c.name || '';
        field('email').value               = c.email || '';
        field('phone').value               = c.phone || '';
        field('institution').value         = c.institution || '';
        field('department').value          = c.department || '';
        field('profession').value          = c.profession || '';
        field('specialty').value           = c.specialty || '';
        field('years_of_experience').value = c.years_of_experience ?? '';
        field('clinic_location').value     = c.clinic_location || '';
      } catch (e) {}
    }

    async function submitEdit() {
      const clinicianId = getCookie('clinician_id');
      const sessionId   = getCookie('session_id');
      if (!clinicianId || !sessionId) {
        alert('cookie 不存在：clinician_id 或 session_id 遺失');
        return;
      }
      const yearsRaw = field('years_of_experience').value;
      const body = {
        id:                  parseInt(clinicianId),
        name:                field('name').value.trim(),
        email:               field('email').value.trim() || null,
        phone:               field('phone').value.trim() || null,
        institution:         field('institution').value.trim() || null,
        department:          field('department').value.trim() || null,
        profession:          field('profession').value.trim() || null,
        specialty:           field('specialty').value.trim() || null,
        years_of_experience: yearsRaw !== '' ? parseInt(yearsRaw) : null,
        clinic_location:     field('clinic_location').value.trim() || null,
      };
      try {
        const res  = await fetch('/clinicians', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${sessionId}` },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        if (!res.ok) {
          alert(data.message || '操作失敗'); return;
        }
        if (data.result) { location.href = '/home'; } else { alert(data.message); }
      } catch (e) {}
    }

    loadProfile();

    // keep-alive
    setInterval(async () => {
      try {
        const res = await fetch('/health');
        document.getElementById('connectionOverlay').style.display = res.ok ? 'none' : 'flex';
      } catch (e) {
        document.getElementById('connectionOverlay').style.display = 'flex';
      }
    }, 10000);
  </script>

  <!-- 連線失敗提示 -->
  <div id="connectionOverlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:9999; align-items:center; justify-content:center;">
    <div style="background:white; border-radius:12px; padding:32px 28px; text-align:center; display:flex; flex-direction:column; gap:14px; max-width:300px; box-shadow:0 8px 32px rgba(0,0,0,0.2);">
      <div style="font-size:16px; font-weight:600; color:#0C447C;">嘗試連線中</div>
      <div style="font-size:13px; color:#378ADD; line-height:1.6;">請確保在網路環境下操作</div>
      <button onclick="document.getElementById('connectionOverlay').style.display='none'" style="background:#185FA5; color:white; border:none; border-radius:6px; padding:10px 24px; font-size:14px; cursor:pointer; font-family:inherit; font-weight:500; margin-top:4px;">確定</button>
    </div>
  </div>
</body>
</html>
